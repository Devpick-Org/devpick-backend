spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devpick_test}
    username: ${DB_USERNAME:devpick}
    password: ${DB_PASSWORD:devpick}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME:devpick}:${MONGO_PASSWORD:devpick}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:devpick_test}?authSource=admin
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@devpick.kr
    password: test-password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1kZXZwaWNrLXRlc3Rpbmc=
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

ai-server:
  url: http://localhost:8000
  timeout-ms: 5000

oauth:
  github:
    client-id: test-github-client-id
    client-secret: test-github-client-secret
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost:3000/auth/google/callback
    token-url: https://oauth2.googleapis.com/token
    user-url: https://www.googleapis.com/oauth2/v2/userinfo

logging:
  level:
    com.devpick: WARN
    org.hibernate: WARN
